fieldedit_05 = "Ontology Annotations"
fieldedit_06 = "<p>To create an annotation, first search for a suitable ontology term using the search box. The selected ontology code can then be assigned to the field itself, to an individual answer option, or to the unit of a numerical field.</p> <p>Assigned annotations are shown in a table below the search area. In this table, annotations can be reviewed and modified, including reassignment or removal.</p> <p><b>Important:</b> The <code>@ONTOLOGY</code> action tag and its JSON parameter should not be edited manually. Annotation editing should always be performed through the <i>Add Ontology Annotations</i> interface in the <i>Edit Field</i> dialog.</p><p>Ontology sources to search in can be configured on the <i>External Modules → ROME: REDCap Ontologies Made Easy</i> plugin page.</p>"
